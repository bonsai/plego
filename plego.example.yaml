# Example Plego config with OAuth fallback

pipeline:
  # Global state database (optional, defaults to ~/.plego/state.db)
  state_db: ~/.plego/state.db

  # Input source (filesystem example)
  source:
    module: filesystem
    path: ./inbox
    extensions:
      - .txt
      - .md

  # Output plugins
  outputs:
    # Gmail output with OAuth fallback
    # Tries: token file → GMAIL_TOKEN env var → interactive OAuth
    - module: gmail
      to: recipient@example.com
      credentials: ~/.config/google/credentials.json
      # Optional: custom token location (defaults to ~/.plego/gmail-token.json)
      # token: ~/.plego/gmail-token.json

    # Example: Multiple outputs (all get auth fallback)
    # - module: slack
    #   to: "#notifications"
    #   credentials: ~/.config/slack/credentials.json
    #   # Falls back to SLACK_TOKEN env var
