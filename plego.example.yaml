global:
  timezone: Asia/Tokyo
  state_db: ~/.plego/state.db

plugins:
  # --- Subscription plugins (input) ---

  # Filesystem: watch local files
  - module: Subscription::Filesystem
    config:
      path: ./inbox
      extensions:
        - .txt
        - .md

  # Google Drive: fetch a specific file
  # - module: Subscription::GoogleDrive
  #   config:
  #     fileId: "your_bookmark_file_id"
  #     credentials: ~/.config/google/credentials.json

  # --- Filter plugins (transform) ---

  # Dedup: skip already-processed entries
  - module: Filter::Deduped

  # Ghwl: convert HTML to plain text (requires ghwl in PATH)
  # - module: Filter::Ghwl
  #   config:
  #     cmd: ghwl
  #     timeout: 30

  # --- Publish plugins (output) ---

  # Gmail: create a draft
  - module: Publish::Gmail
    config:
      to: recipient@example.com
      credentials: ~/.config/google/credentials.json

  # Google Drive: save to a folder
  # - module: Publish::GoogleDrive
  #   config:
  #     folderId: "your_output_folder_id"
  #     fileNamePrefix: bookmark-
  #     credentials: ~/.config/google/credentials.json
