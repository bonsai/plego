# アクティブ設定。現在は v0 と同内容。
# v1 に切り替える場合: cp plego.v1.yaml plego.yaml && git commit
pipeline:
  state_db: state/state.db

  source:
    module: prtimes
    keywords:
      - 試食会
      - 発表会
      - プレス発表会
      - メディア発表会
    industries:
      - レストラン
      - カフェ
      - ホテル
      - 食品
      - 飲食
      - ビストロ
      - バー
      - 居酒屋

  filters:
    - module: yotei

  outputs:
    - module: ical
      output_path: docs/calendar.ics

    - module: json
      output_path: docs/feed.json
